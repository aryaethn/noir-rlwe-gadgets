[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.27"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
# Allow the test to read the bb-generated proof + public inputs.
fs_permissions = [{ access = "read", path = "test/fixtures" }]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
